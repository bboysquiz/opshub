services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: opshub
      POSTGRES_PASSWORD: opshub
      POSTGRES_DB: opshub
    ports:
      - '5432:5432'
    volumes:
      - opshub_pg:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3001
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server

volumes:
  opshub_pg:
