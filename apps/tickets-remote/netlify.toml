[build]
command = "pnpm --filter tickets-remote build"
publish = "apps/tickets-remote/dist"

[build.environment]
NODE_VERSION = "22"
PNPM_VERSION = "10.30.2"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
