[build]
command = "pnpm --filter analytics-remote build"
publish = "apps/analytics-remote/dist"

[build.environment]
NODE_VERSION = "22"
PNPM_VERSION = "10.30.2"
VITE_API_BASE_URL = "/api"

[[redirects]]
from = "/api/*"
to = "https://opshub-api.netlify.app/:splat"
status = 200
force = true

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
